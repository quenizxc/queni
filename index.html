<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shapes</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top left, #111, #000);
    overflow: hidden;
}
.shape {
    position: absolute;
    border-radius: 20px;
    animation: float 6s infinite ease-in-out alternate;
}
.square {
    width: 150px;
    height: 150px;
    background: linear-gradient(45deg, #00f5ff, #0066ff);
    top: 20%;
    left: 15%;
}
.circle {
    width: 200px;
    height: 200px;
    background: linear-gradient(45deg, #ff00cc, #ff6600);
    border-radius: 50%;
    bottom: 15%;
    right: 20%;
}

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Black</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    height: 100vh;
    overflow: hidden;
}

/* Плавающие круги */
.circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(5px);
    animation: float 10s infinite alternate ease-in-out;
}

.circle:nth-child(1) {
    width: 300px;
    height: 300px;
    top: 10%;
    left: 15%;
}

.circle:nth-child(2) {
    width: 200px;
    height: 200px;
    bottom: 15%;
    right: 20%;
    animation-duration: 7s;
}

.circle:nth-child(3) {
    width: 150px;
    height: 150px;
    top: 50%;
    left: 50%;
    animation-duration: 5s;
}

/* Анимация плавания */
@keyframes float {
    0% { transform: translateY(0px) translateX(0px); }
    100% { transform: translateY(-40px) translateX(20px); }
}

/* Линия, которая двигается */
.line {
    position: absolute;
    width: 2px;
    height: 100%;
    background: rgba(255,255,255,0.08);
    left: 50%;
    animation: moveLine 4s infinite alternate ease-in-out;
}

@keyframes moveLine {
    0% { left: 40%; }
    100% { left: 60%; }
}
</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="line"></div>

</body>
</html>
